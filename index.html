<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rioo | Linktree</title>
    <meta name="description" content="Bergabung dengan rioostur di Linktree. Support mimin terus yaa 👋🏻">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="rioo_avatar.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: linear-gradient(180deg, #1a0e2e 0%, #2d1b4e 30%, #1f1435 60%, #16102b 100%);
            background-attachment: fixed;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Animated background particles */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            animation: float-particle linear infinite;
        }

        @keyframes float-particle {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        .container {
            width: 100%;
            max-width: 680px;
            padding: 40px 20px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        /* Profile Avatar */
        .avatar-wrapper {
            position: relative;
            margin-bottom: 16px;
        }

        .avatar-ring {
            width: 104px;
            height: 104px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(135deg, #a855f7, #6366f1, #3b82f6, #a855f7);
            background-size: 300% 300%;
            animation: gradient-rotate 4s ease infinite;
        }

        @keyframes gradient-rotate {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #1a0e2e;
        }

        .avatar-online {
            position: absolute;
            bottom: 6px;
            right: 6px;
            width: 16px;
            height: 16px;
            background: #22c55e;
            border-radius: 50%;
            border: 3px solid #1a0e2e;
            animation: pulse-online 2s ease-in-out infinite;
        }

        @keyframes pulse-online {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
            }

            50% {
                box-shadow: 0 0 0 6px rgba(34, 197, 94, 0);
            }
        }

        /* Username */
        .username {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
            animation: fadeInUp 0.6s ease-out 0.1s both;
        }

        .handle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
            animation: fadeInUp 0.6s ease-out 0.15s both;
        }

        /* Bio */
        .bio {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 16px;
            text-align: center;
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }

        /* Social Icons */
        .social-icons {
            display: flex;
            gap: 16px;
            margin-bottom: 28px;
            animation: fadeInUp 0.6s ease-out 0.25s both;
        }

        .social-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
        }

        .social-icon:hover {
            background: rgba(255, 255, 255, 0.18);
            color: #ffffff;
            transform: translateY(-3px) scale(1.1);
            box-shadow: 0 8px 25px rgba(168, 85, 247, 0.3);
        }

        .social-icon svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Link Buttons */
        .links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-btn {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            padding: 16px 20px;
            border-radius: 50px;
            background: rgba(30, 20, 50, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-decoration: none;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.2px;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            overflow: hidden;
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transition: left 0.5s ease;
        }

        .link-btn:hover::before {
            left: 100%;
        }

        .link-btn:hover {
            background: rgba(50, 35, 80, 0.85);
            border-color: rgba(168, 85, 247, 0.4);
            transform: scale(1.025);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.2), 0 0 0 1px rgba(168, 85, 247, 0.15);
        }

        .link-btn:active {
            transform: scale(0.98);
        }

        .link-btn:nth-child(1) {
            animation: fadeInUp 0.6s ease-out 0.3s both;
        }

        .link-btn:nth-child(2) {
            animation: fadeInUp 0.6s ease-out 0.4s both;
        }

        .link-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .link-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .link-icon svg {
            width: 22px;
            height: 22px;
        }

        .link-icon.whatsapp {
            background: linear-gradient(135deg, #25d366, #128c7e);
        }

        .link-icon.whatsapp svg {
            fill: #ffffff;
        }

        .link-text {
            flex: 1;
            text-align: center;
            margin-right: 40px;
        }

        .link-arrow {
            position: absolute;
            right: 20px;
            opacity: 0;
            transform: translateX(-8px);
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.5);
        }

        .link-btn:hover .link-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        /* Footer */
        .footer {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            animation: fadeInUp 0.6s ease-out 0.5s both;
        }

        .footer-logo {
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.35);
            font-size: 13px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .footer-logo:hover {
            color: rgba(255, 255, 255, 0.6);
        }

        .footer-logo svg {
            width: 18px;
            height: 18px;
        }

        .footer-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.25);
            text-align: center;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 30px 16px 50px;
            }

            .username {
                font-size: 20px;
            }

            .link-btn {
                padding: 14px 16px;
                font-size: 14px;
            }

            .link-icon {
                width: 36px;
                height: 36px;
            }

            .link-text {
                margin-right: 36px;
            }
        }

        /* Subtle scan line effect */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.02) 2px,
                    rgba(0, 0, 0, 0.02) 4px);
        }
    </style>
</head>

    <script>
        // Generate floating particles
        const particlesContainer = document.getElementById('particles');
        const particleCount = 20;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 4 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
            particle.style.animationDelay = (Math.random() * 10) + 's';
            particlesContainer.appendChild(particle);
        }

        // Add ripple effect to buttons
        document.querySelectorAll('.link-btn').forEach(btn => {
            btn.addEventListener('click', function (e) {
                const ripple = document.createElement('span');
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                ripple.style.cssText = `
                    position: absolute;
                    border-radius: 50%;
                    background: rgba(255, 255, 255, 0.15);
                    width: 0;
                    height: 0;
                    left: ${x}px;
                    top: ${y}px;
                    transform: translate(-50%, -50%);
                    animation: ripple-effect 0.6s ease-out forwards;
                    pointer-events: none;
                `;

                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });

        // Ripple animation via JS
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple-effect {
                to {
                    width: 300px;
                    height: 300px;
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // Intersection observer for scroll animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);
    </script>
